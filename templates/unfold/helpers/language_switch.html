{% load i18n %}
{% get_current_language as CURRENT_LANG %}
{% get_available_languages as ALL_LANGS %}

<div class="relative" x-data="{ openLang: false }">
    <a class="block cursor-pointer leading-none hover:text-gray-700 dark:hover:text-gray-200" x-on:click="openLang = !openLang" title="{% trans 'Language' %}">
        <span class="material-symbols-outlined">language</span>
    </a>

    <nav class="absolute bg-white border flex flex-col leading-none overflow-hidden py-1 -right-2 rounded shadow-lg top-7 w-44 z-50 dark:bg-gray-800 dark:border-gray-700" x-cloak x-show="openLang" @click.outside="openLang = false">
        {% for code, name in ALL_LANGS %}
        <form action="{% url 'set_language' %}" method="post" class="contents">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.path }}">
            <input type="hidden" name="language" value="{{ code }}">
            <button type="submit"
                    class="cursor-pointer flex flex-row leading-none mx-1 px-3 py-1.5 rounded text-left w-[calc(100%-0.5rem)] bg-transparent border-0 hover:bg-gray-100 hover:text-gray-700 dark:hover:bg-gray-700 dark:hover:text-gray-200 {% if code == CURRENT_LANG %}text-primary-600 dark:text-primary-500 font-semibold{% endif %}">
                <span class="material-symbols-outlined mr-2 text-sm self-center">{% if code == CURRENT_LANG %}check{% else %}translate{% endif %}</span>
                <span class="leading-none self-center">{{ name }}</span>
            </button>
        </form>
        {% endfor %}
    </nav>
</div>
