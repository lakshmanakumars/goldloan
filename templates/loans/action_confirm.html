{% extends "admin/base_site.html" %}
{% block content %}
<div style="max-width:560px;margin:32px auto;padding:0 16px;font-family:system-ui;color:#1f2937">
  <h1 style="font-size:20px;margin:0 0 12px">{{ title }}</h1>
  <div style="background:#fff;padding:16px 18px;border-radius:8px;border:1px solid #e5e7eb;line-height:1.6">
    {{ message|safe }}
  </div>
  <form method="post" style="margin-top:16px;display:flex;gap:8px">
    {% csrf_token %}
    <button type="submit" style="padding:8px 16px;background:#b91c1c;color:#fff;border:0;border-radius:6px;cursor:pointer;font-weight:600">{{ submit_label }}</button>
    <a href="javascript:history.back()" style="padding:8px 16px;background:#fff;color:#374151;border:1px solid #d1d5db;border-radius:6px;text-decoration:none">Cancel</a>
  </form>
</div>
{% endblock %}
