{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vaarahi GoldLoan SaaS — Platform</title>
<link rel="icon" type="image/svg+xml" href="{% static 'vaarahi/favicon.svg' %}">
<link rel="icon" type="image/png" sizes="32x32" href="{% static 'vaarahi/favicon-32x32.png' %}">
<link rel="apple-touch-icon" sizes="180x180" href="{% static 'vaarahi/favicon-180x180.png' %}">
<link rel="stylesheet" href="{% static 'vaarahi/vaarahi.css' %}">
<style>
  body { margin: 0; background: #f9fafb; color: #c46616;
         font-family: system-ui, -apple-system, sans-serif; min-height: 100vh;
         display: flex; align-items: center; justify-content: center; padding: 20px; }
  .wrap { max-width: 640px; text-align: center; }
  .ring { width: 96px; height: 96px; border-radius: 50%; background: #fff;
          color: #c46616; display: inline-flex; align-items: center;
          justify-content: center; font-family: Georgia, serif; font-size: 56px;
          font-weight: 600; border: 3px solid #c46616;
          margin-bottom: 20px; }
  h1 { font-family: Georgia, serif; font-size: 32px; font-weight: 600;
       color: #c46616; margin: 0 0 6px; }
  .sub { color: #6b7280; font-size: 12px; letter-spacing: .35em;
         text-transform: uppercase; margin-bottom: 26px; }
  p { color: #a24d11; max-width: 440px; margin: 0 auto 24px; }
  .cta { background: #c46616; color: #fde68a; padding: 12px 28px;
         border-radius: 8px; text-decoration: none; font-weight: 700;
         font-size: 14px; display: inline-flex; align-items: center; gap: 8px;
         letter-spacing: .03em; }
  .cta:hover { background: #a24d11; color: #fff; }
  .note { margin-top: 32px; color: #6b7280; font-size: 12px; }
  code { background: #fff; padding: 2px 8px; border-radius: 4px;
         border: 1px solid #e5e7eb; color: #c46616;
         font-family: ui-monospace, monospace; }
</style>
</head>
<body>
<div class="wrap">
  <div class="ring">V</div>
  <h1>Vaarahi GoldLoan SaaS</h1>
  <p class="sub">Multi-tenant lending platform</p>
  <p>Each pawn broker gets their own back-office subdomain. Platform super-admins
  manage the broker roster from this host.</p>
  <a class="cta" href="/admin/login/">Super-admin sign in &nbsp;→</a>
  <p class="note">Tenant portals: <code>&lt;slug&gt;.localhost:8765</code></p>
</div>
</body>
</html>
